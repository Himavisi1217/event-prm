{% extends "base.html" %} {% block title %}Registration Successful{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card card-glass shadow-lg border-0 text-center">
      <div class="card-body p-4 p-md-5">
        <div class="success-icon mb-3">
          <span class="checkmark">✓</span>
        </div>
        <h1 class="h3 fw-semibold mb-3">Registration Successful</h1>
        <p class="text-muted mb-4">

        </p>
        <!-- Buttons removed as per request: customers only register once -->
      </div>
    </div>
  </div>
</div>
{% endblock %}
